name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set manifest version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}" python3 -c "
          import json, os
          path = 'extension/manifest.json'
          manifest = json.load(open(path))
          manifest['version'] = os.environ['VERSION']
          json.dump(manifest, open(path, 'w'), indent=2)
          print('manifest version set to', manifest['version'])
          "

      - name: Sign extension via addons.mozilla.org
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: ./sign.sh

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/*.xpi --generate-notes
